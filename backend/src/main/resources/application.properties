spring.application.name=launchpad

# MySQL Database Configuration
# The createDatabaseIfNotExist flag automatically creates the 'launchpad_db' database
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:launchpad_db}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:likhitha@0805}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate Configuration (Auto-update the database schema based on models)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Secret Configuration
# A strong 256-bit secret key used to sign the tokens
launchpad.app.jwtSecret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
launchpad.app.jwtExpirationMs=86400000

# Railway Port Configuration
server.port=${PORT:8080}
