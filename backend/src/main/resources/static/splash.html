<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StackCrew</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #001a0d;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
        }

        /* ─── Particle Canvas ─── */
        #particles {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        /* ─── Radial glow behind logo ─── */
        .glow-bg {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(239, 68, 68, 0.15) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            animation: glowPulse 3s ease-out 0.2s forwards;
            z-index: 1;
        }

        @keyframes glowPulse {
            0%   { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            50%  { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
        }

        /* ─── Main container ─── */
        .splash-container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }

        /* ─── Lightning bolt icon ─── */
        .logo-icon {
            width: 100px;
            height: 100px;
            border-radius: 28px;
            background: linear-gradient(135deg, #ff4d4d, #e60000);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 52px;
            box-shadow:
                0 0 40px rgba(239, 68, 68, 0.4),
                0 0 80px rgba(239, 68, 68, 0.2),
                inset 0 1px 1px rgba(255,255,255,0.15);
            opacity: 0;
            transform: scale(0.3) rotate(-20deg);
            animation: iconEntry 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s forwards,
                       iconFloat 3s ease-in-out 1.5s infinite alternate;
        }

        @keyframes iconEntry {
            0%   { opacity: 0; transform: scale(0.3) rotate(-20deg); }
            100% { opacity: 1; transform: scale(1) rotate(0deg); }
        }

        @keyframes iconFloat {
            0%   { transform: translateY(0); }
            100% { transform: translateY(-8px); }
        }

        /* Ring pulse around icon */
        .logo-icon::before,
        .logo-icon::after {
            content: '';
            position: absolute;
            border-radius: 28px;
            border: 2px solid rgba(239, 68, 68, 0.3);
            inset: -12px;
            opacity: 0;
            animation: ringPulse 2s ease-out 1s infinite;
        }
        .logo-icon::after {
            inset: -24px;
            animation-delay: 1.3s;
        }

        @keyframes ringPulse {
            0%   { transform: scale(0.8); opacity: 0.8; }
            100% { transform: scale(1.3); opacity: 0; }
        }

        /* ─── Brand name ─── */
        .brand-name {
            font-size: 56px;
            font-weight: 800;
            letter-spacing: -1px;
            color: #f1f5f9;
            overflow: hidden;
        }

        .brand-name span {
            display: inline-block;
            opacity: 0;
            transform: translateY(40px) rotateX(90deg);
            animation: letterReveal 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes letterReveal {
            0%   { opacity: 0; transform: translateY(40px) rotateX(90deg); }
            100% { opacity: 1; transform: translateY(0) rotateX(0deg); }
        }

        .brand-name .red {
            color: #ef4444;
            text-shadow: 0 0 30px rgba(239, 68, 68, 0.5);
        }

        /* ─── Tagline ─── */
        .tagline {
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            font-weight: 300;
            color: #94a3b8;
            letter-spacing: 4px;
            text-transform: uppercase;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.8s ease-out 1.6s forwards;
        }

        @keyframes fadeUp {
            0%   { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* ─── Loading bar ─── */
        .loader-track {
            width: 200px;
            height: 3px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            overflow: hidden;
            opacity: 0;
            animation: fadeUp 0.5s ease-out 2s forwards;
            margin-top: 8px;
        }

        .loader-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ef4444, #ff4d4d, #ef4444);
            background-size: 200% 100%;
            border-radius: 10px;
            animation: loaderGrow 2s ease-in-out 2.2s forwards,
                       loaderShimmer 1s linear 2.2s infinite;
        }

        @keyframes loaderGrow {
            0%   { width: 0%; }
            60%  { width: 75%; }
            100% { width: 100%; }
        }

        @keyframes loaderShimmer {
            0%   { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* ─── Fade-out transition ─── */
        .splash-exit {
            animation: exitSplash 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes exitSplash {
            0%   { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(1.05); filter: blur(8px); }
        }

        /* ─── Floating shapes (decorative) ─── */
        .deco-shape {
            position: fixed;
            border-radius: 50%;
            opacity: 0.06;
            z-index: 0;
        }
        .deco-shape-1 {
            width: 300px; height: 300px;
            background: #ef4444;
            top: -80px; left: -80px;
            animation: decoFloat 8s ease-in-out infinite alternate;
        }
        .deco-shape-2 {
            width: 200px; height: 200px;
            background: #ff4d4d;
            bottom: -50px; right: -50px;
            animation: decoFloat 6s ease-in-out 1s infinite alternate-reverse;
        }
        .deco-shape-3 {
            width: 150px; height: 150px;
            background: #e60000;
            top: 40%; right: 10%;
            animation: decoFloat 7s ease-in-out 0.5s infinite alternate;
        }

        @keyframes decoFloat {
            0%   { transform: translate(0, 0); }
            100% { transform: translate(20px, -30px); }
        }
    </style>
</head>
<body>
    <canvas id="particles"></canvas>
    <div class="glow-bg"></div>

    <div class="deco-shape deco-shape-1"></div>
    <div class="deco-shape deco-shape-2"></div>
    <div class="deco-shape deco-shape-3"></div>

    <div class="splash-container" id="splashContainer">
        <div class="logo-icon" id="logoIcon">⚡</div>
        <div class="brand-name" id="brandName"></div>
        <div class="tagline">Find your stack. Build your team.</div>
        <div class="loader-track">
            <div class="loader-fill" id="loaderFill"></div>
        </div>
    </div>

    <script>
        // ─── Letter-by-letter reveal ───
        (function() {
            const name = 'StackCrew';
            const container = document.getElementById('brandName');
            const redStart = 5; // 'Crew' starts at index 5

            name.split('').forEach((char, i) => {
                const span = document.createElement('span');
                span.textContent = char;
                span.style.animationDelay = `${0.9 + i * 0.07}s`;
                if (i >= redStart) span.classList.add('red');
                container.appendChild(span);
            });
        })();

        // ─── Particle system ───
        (function() {
            const canvas = document.getElementById('particles');
            const ctx = canvas.getContext('2d');
            let w, h, particles = [];

            function resize() {
                w = canvas.width = window.innerWidth;
                h = canvas.height = window.innerHeight;
            }
            resize();
            window.addEventListener('resize', resize);

            class Particle {
                constructor() { this.reset(); }
                reset() {
                    this.x = Math.random() * w;
                    this.y = Math.random() * h;
                    this.size = Math.random() * 2 + 0.5;
                    this.speedX = (Math.random() - 0.5) * 0.4;
                    this.speedY = (Math.random() - 0.5) * 0.4;
                    this.opacity = Math.random() * 0.5 + 0.1;
                    this.hue = Math.random() > 0.5 ? 0 : 10; // red hues
                }
                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    if (this.x < 0 || this.x > w || this.y < 0 || this.y > h) this.reset();
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${this.hue}, 80%, 60%, ${this.opacity})`;
                    ctx.fill();
                }
            }

            for (let i = 0; i < 80; i++) particles.push(new Particle());

            // Draw connections between nearby particles
            function drawConnections() {
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 120) {
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.strokeStyle = `rgba(239, 68, 68, ${0.06 * (1 - dist / 120)})`;
                            ctx.lineWidth = 0.5;
                            ctx.stroke();
                        }
                    }
                }
            }

            function animate() {
                ctx.clearRect(0, 0, w, h);
                particles.forEach(p => { p.update(); p.draw(); });
                drawConnections();
                requestAnimationFrame(animate);
            }
            animate();
        })();

        // ─── Auto-redirect after animation ───
        setTimeout(() => {
            document.getElementById('splashContainer').classList.add('splash-exit');
            document.querySelector('.glow-bg').classList.add('splash-exit');
            setTimeout(() => {
                // Check if user is logged in
                const token = localStorage.getItem('token');
                if (token) {
                    window.location.href = '/index.html';
                } else {
                    window.location.href = '/auth.html';
                }
            }, 600);
        }, 4200);
    </script>
</body>
</html>
