<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="StackCrew Dashboard — Manage your projects, applications, and team collaborations.">
    <title>Dashboard | StackCrew</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <nav class="navbar glass-panel">
        <div class="logo">⚡ StackCrew</div>
        <div class="nav-links">
            <a href="discover.html">Discover</a>
            <a href="dashboard.html" class="active">Dashboard</a>
            <button class="btn-secondary" id="nav-logout">Logout</button>
        </div>
    </nav>

    <main class="container fade-in">
        <header class="dashboard-header">
            <div>
                <h2>Welcome, <span id="user-name-display" class="gradient-text">Developer</span></h2>
                <p id="dashboard-role-desc">Post projects, edit profile, and request to collaborate with others.</p>
            </div>
            <button class="btn-primary glow-effect" id="btn-create-project">+ New Project</button>
        </header>

        <!-- Create Project Modal -->
        <div id="create-project-modal" class="modal hidden">
            <div class="modal-content glass-panel slide-up">
                <span class="close-modal">&times;</span>
                <h3>Create New Project</h3>
                <form id="create-project-form">
                    <div class="form-group inline-btn-group">
                        <div style="flex-grow: 1;">
                            <label for="proj-github-sync">GitHub Repo URL (Optional Sync)</label>
                            <input type="url" id="proj-github-sync" placeholder="https://github.com/user/repo">
                        </div>
                        <button type="button" class="btn-secondary" id="btn-github-sync" style="margin-top: 1.6rem; padding: 0.8rem 1.2rem; font-size: 0.85rem; white-space: nowrap;">⚡ Sync Repo</button>
                    </div>
                    <div id="github-sync-status" style="font-size: 0.82rem; margin-top: -1rem; margin-bottom: 1rem; font-weight: 500;"></div>

                    <div class="form-group">
                        <label for="proj-title">Project Title</label>
                        <input type="text" id="proj-title" required placeholder="e.g. AI Resume Builder">
                    </div>
                    <div class="form-group">
                        <label for="proj-desc">Description</label>
                        <textarea id="proj-desc" rows="4" required placeholder="Describe what you're building and what problem it solves..."></textarea>
                    </div>
                    <div class="form-group">
                        <label for="proj-stack">Tech Stack (comma separated)</label>
                        <input type="text" id="proj-stack" required placeholder="e.g. React, Node.js, MongoDB">
                    </div>
                    <div class="form-group">
                        <label for="proj-reqs">Required Skills / Roles (comma separated)</label>
                        <input type="text" id="proj-reqs" required placeholder="e.g. Backend Dev, UI/UX Designer">
                    </div>
                    <div class="form-group">
                        <label for="proj-commitment">Commitment Level</label>
                        <select id="proj-commitment" class="form-select">
                            <option value="Casual">🌱 Casual (1–3 hrs/week)</option>
                            <option value="Part-time">⚡ Part-time (5–10 hrs/week)</option>
                            <option value="Full-time">🚀 Full-time (20+ hrs/week)</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-primary w-100">Publish Project</button>
                </form>
            </div>
        </div>

        <div class="dashboard-grid" id="dashboard-grid-container">
            <!-- Left Column: Projects -->
            <div style="display: flex; flex-direction: column; gap: 2rem;">
                <!-- Recommended Projects -->
                <section id="collaborator-projects-section" class="dashboard-section glass-panel">
                    <h3>🎯 Recommended For You</h3>
                    <div class="list-container" id="recommended-projects-list">
                        <!-- Recommended projects injected here -->
                    </div>
                </section>

                <!-- My Published Projects -->
                <section id="creator-section" class="dashboard-section glass-panel">
                    <h3>📦 My Published Projects</h3>
                    <div class="list-container" id="my-projects-list">
                        <!-- Projects injected here -->
                    </div>
                </section>
            </div>

            <!-- Right Column: Profile & Info -->
            <div style="display: flex; flex-direction: column; gap: 2rem;">
                <!-- My Profile Section -->
                <section class="dashboard-section glass-panel">
                    <h3>👤 My Profile</h3>
                    <form id="profile-form" style="display: flex; flex-direction: column; gap: 1rem; margin-top: 1rem;">
                        <div class="form-group" style="margin-bottom: 0;">
                            <label for="profile-name">Full Name</label>
                            <input type="text" id="profile-name" required>
                        </div>
                        <div class="form-group" style="margin-bottom: 0;">
                            <label for="profile-skills">My Skills (comma separated)</label>
                            <input type="text" id="profile-skills" placeholder="e.g. React, Java, Node.js">
                        </div>
                        <div class="form-group" style="margin-bottom: 0;">
                            <label for="profile-github">GitHub Profile URL</label>
                            <input type="url" id="profile-github" placeholder="https://github.com/yourusername">
                        </div>
                        <button type="submit" class="btn-primary w-100" style="padding: 0.75rem;">Save Profile</button>
                    </form>
                </section>

                <!-- My Notifications -->
                <section class="dashboard-section glass-panel">
                    <h3>🔔 Notifications</h3>
                    <div class="list-container" id="notifications-list">
                        <!-- Notifications injected here -->
                    </div>
                </section>

                <!-- My Applications -->
                <section class="dashboard-section glass-panel">
                    <h3>📋 My Applications</h3>
                    <div class="list-container" id="my-applications-list">
                        <!-- Applications injected here -->
                    </div>
                </section>
            </div>
        </div>
    </main>

    <script src="js/api.js?v=3"></script>
    <script src="js/dashboard.js?v=3"></script>
</body>
</html>
