<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="StackCrew — Find your stack, build your team, ship together. The developer collaboration platform where skills meet opportunity.">
    <title>StackCrew | Find Your Stack. Build Your Team.</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <nav class="navbar glass-panel">
        <div class="logo">⚡ StackCrew</div>
        <div class="nav-links">
            <a href="index.html" class="active">Discover</a>
            <a href="dashboard.html" id="nav-dashboard" style="display: none;">Dashboard</a>
            <a href="auth.html" class="btn-primary" id="nav-login">Sign In</a>
            <button class="btn-secondary" id="nav-logout" style="display: none;">Logout</button>
        </div>
    </nav>

    <header class="hero slide-up">
        <div class="hero-badge">🚀 Open Source Collaboration Platform</div>
        <h1>Find Your Stack.<br><span class="gradient-text">Build Your Team.</span></h1>
        <p>Connect with developers, designers & creators. Browse real projects, find your perfect role, and ship something amazing — together.</p>
    </header>

    <main class="container fade-in">
        <!-- Filter Bar -->
        <div class="filter-bar glass-panel">
            <div class="filter-title">🔍 Filter by Tech Stack</div>
            <div class="filter-tags" id="filter-tags">
                <button class="filter-tag active" data-tag="all">All</button>
                <button class="filter-tag" data-tag="React">React</button>
                <button class="filter-tag" data-tag="Vue">Vue</button>
                <button class="filter-tag" data-tag="Angular">Angular</button>
                <button class="filter-tag" data-tag="Node.js">Node.js</button>
                <button class="filter-tag" data-tag="Spring Boot">Spring Boot</button>
                <button class="filter-tag" data-tag="Python">Python</button>
                <button class="filter-tag" data-tag="Java">Java</button>
                <button class="filter-tag" data-tag="Flutter">Flutter</button>
                <button class="filter-tag" data-tag="MongoDB">MongoDB</button>
                <button class="filter-tag" data-tag="MySQL">MySQL</button>
                <button class="filter-tag" data-tag="AI/ML">AI/ML</button>
            </div>
            <div class="filter-search">
                <input type="text" id="search-input" placeholder="Search projects by title or description..." />
            </div>
        </div>

        <div class="section-header">
            <h2>Open Projects <span id="project-count" class="count-badge"></span></h2>
        </div>
        <div class="projects-grid" id="projects-container">
            <!-- Projects dynamically injected here -->
        </div>
    </main>

    <script src="js/api.js?v=3"></script>
    <script src="js/app.js?v=3"></script>
</body>
</html>
