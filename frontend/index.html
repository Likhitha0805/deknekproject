<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IgniteHub | Project Collaboration Hub</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <nav class="navbar glass-panel">
        <div class="logo">🔥 IgniteHub</div>
        <div class="nav-links">
            <a href="index.html" class="active">Discover</a>
            <a href="dashboard.html" id="nav-dashboard" style="display: none;">Dashboard</a>
            <a href="auth.html" class="btn-primary" id="nav-login">Sign In</a>
            <button class="btn-secondary" id="nav-logout" style="display: none;">Logout</button>
        </div>
    </nav>

    <header class="hero slide-up">
        <h1>Find Your Next Big <span class="gradient-text">Side Project</span></h1>
        <p>Connect with developers, designers, and creators to build something amazing together.</p>
    </header>

    <main class="container fade-in">
        <div class="section-header">
            <h2>Open Projects</h2>
        </div>
        <div class="projects-grid" id="projects-container">
            <!-- Projects will be dynamically injected here -->
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
