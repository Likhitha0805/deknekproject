<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | IgniteHub</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <nav class="navbar glass-panel">
        <div class="logo">🔥 IgniteHub</div>
        <div class="nav-links">
            <a href="index.html">Discover</a>
            <a href="dashboard.html" class="active">Dashboard</a>
            <button class="btn-secondary" id="nav-logout">Logout</button>
        </div>
    </nav>

    <main class="container fade-in">
        <header class="dashboard-header">
            <div>
                <h2>Welcome to your <span class="gradient-text">Dashboard</span></h2>
                <p>Manage your projects and applications</p>
            </div>
            <button class="btn-primary glow-effect" id="btn-create-project">+ New Project</button>
        </header>

        <!-- Create Project Modal -->
        <div id="create-project-modal" class="modal hidden">
            <div class="modal-content glass-panel slide-up">
                <span class="close-modal">&times;</span>
                <h3>Create New Project</h3>
                <form id="create-project-form">
                    <div class="form-group">
                        <label for="proj-title">Project Title</label>
                        <input type="text" id="proj-title" required>
                    </div>
                    <div class="form-group">
                        <label for="proj-desc">Description</label>
                        <textarea id="proj-desc" rows="4" required></textarea>
                    </div>
                    <div class="form-group">
                        <label for="proj-stack">Tech Stack (comma separated)</label>
                        <input type="text" id="proj-stack" required placeholder="e.g. React, Node.js, MongoDB">
                    </div>
                    <button type="submit" class="btn-primary w-100">Publish Project</button>
                </form>
            </div>
        </div>

        <div class="dashboard-grid">
            <section class="dashboard-section glass-panel">
                <h3>My Projects</h3>
                <div class="list-container" id="my-projects-list">
                    <!-- Projects injected here -->
                </div>
            </section>
            
            <section class="dashboard-section glass-panel">
                <h3>My Applications</h3>
                <div class="list-container" id="my-applications-list">
                    <!-- Applications injected here -->
                </div>
            </section>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
